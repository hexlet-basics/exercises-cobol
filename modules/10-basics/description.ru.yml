---

name: Основы COBOL
description: |
  COBOL — один из старейших языков программирования, созданный для бизнес-приложений и обработки данных. Он до сих пор используется в банковских и государственных системах. Синтаксис языка близок к обычному английскому. В первом модуле познакомимся с основами языка.
